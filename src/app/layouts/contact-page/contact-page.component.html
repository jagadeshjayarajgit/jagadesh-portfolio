<div class="container mt-5 p-3">
    <div class="card contact-card p-4">
      <h3 class="text-light mb-3">Get in Touch</h3>
      <form>
        <div class="mb-3">
          <label for="name" class="form-label text-light">Name</label>
          <input type="text" class="form-control dark-input" id="name" placeholder="Your Name">
        </div>
  
        <div class="mb-3">
          <label for="email" class="form-label text-light">Email</label>
          <input type="email" class="form-control dark-input" id="email" placeholder="you@example.com">
        </div>
  
        <div class="mb-3">
          <label for="message" class="form-label text-light">Message</label>
          <textarea class="form-control dark-input" id="message" rows="4" placeholder="Type your message here..."></textarea>
        </div>
  
        <button type="submit" class="btn btn-outline-warning">Send Message</button>
      </form>
    </div>
  </div>
