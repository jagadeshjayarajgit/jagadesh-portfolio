<div class="connect-page p-4">

  <!-- ── Section: Social Links ── -->
  <h2 class="section-title ">Connect</h2>
  <span class="gold-bar "></span>
  <p class="sub-text">Find me across the web — code, career, or just a quick hello.</p>

  <div class="social-grid">
    @for (s of socials; track s.platform; let i = $index) {
      <a [href]="s.url" target="_blank" rel="noopener noreferrer"
         class="social-card">
        <div class="card-preview">
          <i class="bi {{ s.icon }} preview-icon"></i>
        </div>
        <div class="card-label">
          <span class="platform-name">{{ s.platform }}</span>
          <span class="platform-handle">{{ s.handle }}</span>
        </div>
      </a>
    }
  </div>
</div>
