<div class="p-4">
    <h2 class="section-title fade-in-up">Projects</h2>
    <span class="gold-bar fade-in-up delay-1"></span>
    <p class="sub-text fade-in-up delay-1">Things I've built — from hospital ops to blockchain research.</p>

    <div class="projects-grid">
        @for (project of projects; track project.name; let i = $index) {
            <div class="project-item fade-in-up" [class]="'delay-' + (i + 2)">

                <!-- Preview image -->
                <div class="preview-wrap">
                    @if (project.url) {
                        <a [href]="project.url" target="_blank" rel="noopener noreferrer" class="preview-link">
                            <img [src]="project.image" [alt]="project.name" class="preview-img">
                            <div class="preview-overlay">
                                <i class="bi bi-arrow-up-right"></i>
                            </div>
                        </a>
                    } @else {
                        <div class="preview-link">
                            <img [src]="project.image" [alt]="project.name" class="preview-img">
                        </div>
                    }
                </div>

                <!-- Text below image -->
                <div class="project-label">
                    <span class="project-name">{{ project.name }}</span>
                    <span class="project-category">{{ project.category }}</span>
                </div>

            </div>
        }
    </div>
</div>
