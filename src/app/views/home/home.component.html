<div class="content-card">
    <div class="d-flex justify-content-end p-3 nav-menu">
        <button class="nav-btn" [ngClass]="{'active': activeId === 1}" (click)="changePage(1)">
            <i class="bi bi-person-fill me-1"></i>About
        </button>
        <button class="nav-btn" [ngClass]="{'active': activeId === 2}" (click)="changePage(2)">
            <i class="bi bi-briefcase-fill me-1"></i>Career
        </button>
        <!-- <button class="nav-btn" [ngClass]="{'active': activeId === 6}" (click)="changePage(6)">
            <i class="bi bi-grid-fill me-1"></i>Projects
        </button> -->
        <!-- <button class="nav-btn ai-tab" [ngClass]="{'active': activeId === 7}" (click)="changePage(7)">
            <i class="bi bi-stars me-1"></i>AI Stack
        </button> -->
        <button class="nav-btn" [ngClass]="{'active': activeId === 4}" (click)="changePage(4)">
            <i class="bi bi-share-fill me-1"></i>Connect
        </button>
        <button class="nav-btn" [ngClass]="{'active': activeId === 5}" (click)="changePage(5)">
            <i class="bi bi-terminal-fill me-1"></i>Terminal
        </button>
    </div>

    <div class="page-content">
        @if (activeId === 1) {
            <app-about-page></app-about-page>
        } @else if (activeId === 2) {
            <app-career-snapshot></app-career-snapshot>
        } @else if (activeId === 4) {
            <app-socials></app-socials>
        } @else if (activeId === 5) {
            <app-terminal-view></app-terminal-view>
        } @else if (activeId === 6) {
            <app-project-page></app-project-page>
        } @else if (activeId === 7) {
            <app-ai-tools></app-ai-tools>
        }
    </div>
</div>
